<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terms of Service - Ace by Good Timing</title>
  <link rel="icon" type="image/svg+xml" href="ace-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0C0B14;
      --accent: #7F77DD;
      --accent-light: #AFA9EC;
      --border: rgba(127, 119, 221, 0.2);
      --text-primary: #F0EFF4;
      --text-secondary: #9895A8;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-heading: Georgia, 'Times New Roman', serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text-primary);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      padding: 20px 40px;
      border-bottom: 1px solid rgba(127, 119, 221, 0.08);
    }

    nav a {
      font-family: var(--font-heading);
      font-size: 1.15rem;
      color: var(--text-primary);
      text-decoration: none;
    }

    nav a em { color: var(--accent-light); font-style: italic; }
    nav a span { color: var(--text-secondary); font-weight: 400; }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 40px 120px;
    }

    h1 {
      font-family: var(--font-heading);
      font-size: 2.2rem;
      margin-bottom: 12px;
    }

    .last-updated {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 48px;
    }

    h2 {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      margin-top: 40px;
      margin-bottom: 12px;
    }

    p, ul {
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    ul { padding-left: 24px; }
    li { margin-bottom: 8px; }

    a { color: var(--accent-light); }

    footer {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
      font-size: 0.82rem;
      border-top: 1px solid var(--border);
      max-width: 720px;
      margin: 0 auto;
    }

    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      main { padding: 60px 20px 80px; }
    }
  </style>
</head>

<body>
  <nav>
    <a href="/"><em>Ace</em> <span>by Good Timing</span></a>
  </nav>

  <main>
    <h1>Terms of Service</h1>
    <p class="last-updated">Last updated: March 24, 2026</p>

    <p>Terms of service content coming soon. For questions, contact <a href="mailto:legal@goodtiming.ai">legal@goodtiming.ai</a>.</p>
  </main>

  <footer>
    &copy; 2026 Good Timing, Inc. All rights reserved.
  </footer>
</body>

</html>
